apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: alpha-frontend
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/robpalacios1/internal-developer-platform-core.git
    targetRevision: feature/develop
    path: charts/platform-application
    
    # Here the teams can add their own values
    helm:
      values: |
        replicaCount: 3
        image:
          repository: yeasy/simple-web
          tag: latest
        service:
          port: 80
        # Crossplane integration
        database:
          enabled: true
        env:
          - name: APP_ENV
            value: "staging"
          - name: TEAM_NAME  
            value: "Alpha"

  destination:
    server: "https://kubernetes.default.svc"
    # Important: deploy the app in the same namespace self generated by crossplane
    namespace: db-env-alpha

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    # sync-options allow ArgoCD to create the namespace db-env-alpha else yet if not exist  
    syncOptions:
    - CreateNamespace=true
